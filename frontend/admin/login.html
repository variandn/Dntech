<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | DNtech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body class="login-page">

  <div class="login-card animate-fade-up">
    <div class="login-card__logo">
      <h1 class="navbar__logo-text text-dark" style="font-size: 2.5rem; justify-content: center;">DN<span class="text-primary">tech</span></h1>
    </div>
    <h2>Admin Access</h2>
    
    <form id="loginForm" action="dashboard.html" method="GET" data-validate>
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <div class="filter-bar__search" style="min-width: 100%;">
          <i class="fas fa-user"></i>
          <input type="text" id="username" name="username" class="form-input" style="padding-left: 44px;" required>
        </div>
        <div class="form-error"></div>
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="filter-bar__search" style="min-width: 100%;">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" class="form-input" style="padding-left: 44px;" required>
        </div>
        <div class="form-error"></div>
      </div>
      
      <button type="submit" class="btn btn--primary btn--full mt-4">Login to Dashboard</button>
    </form>
    
    <div class="text-center mt-3">
      <a href="../index.html" class="text-muted" style="font-size: var(--fs-sm);"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>

  <script src="../js/api-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/forms.js"></script>
</body>
</html>
