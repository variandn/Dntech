<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | DNtech Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/pages/admin.css">
</head>
<body>

  <nav class="navbar" style="position: sticky; z-index: 1000;">
    <div class="container" style="max-width: 100%;">
      <a href="../index.html" class="navbar__logo">
        <span class="navbar__logo-text">DN<span>tech</span> <span style="font-size: 1rem; color: var(--color-silver); font-weight: normal; margin-left: 10px;">| Admin</span></span>
      </a>
      <div style="display: flex; align-items: center; gap: 20px;">
        <span class="text-white fw-medium"><i class="fas fa-user-circle"></i> Admin User</span>
        <a href="login.html" class="btn btn--secondary btn--sm" style="border-color: rgba(255,255,255,0.2); color: white;">Logout</a>
      </div>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <ul class="admin-sidebar__menu">
        <li><a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
        <li><a href="enquiries.html"><i class="fas fa-envelope"></i> Contact Enquiries</a></li>
        <li><a href="jobs.html"><i class="fas fa-briefcase"></i> Job Listings</a></li>
        <li><a href="applications.html"><i class="fas fa-file-alt"></i> Applications</a></li>
        <li><a href="training-enquiries.html"><i class="fas fa-graduation-cap"></i> Training Enquiries</a></li>
        <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="admin-header animate-fade-up">
        <h1>Account Settings</h1>
      </div>

      <div class="grid grid--2 animate-fade-up" style="animation-delay: 0.1s;">
        <!-- Profile Settings -->
        <div class="card">
          <div class="card__body">
            <h3 class="mb-3">Admin Profile</h3>
            <form id="profileForm" method="PUT" data-validate>
              <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="settingsUsername" class="form-input" disabled>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="settingsEmail" name="email" class="form-input" required>
                <div class="form-error"></div>
              </div>
              <button type="submit" class="btn btn--primary">Save Profile</button>
            </form>
          </div>
        </div>

        <!-- Security Settings -->
        <div class="card">
          <div class="card__body">
            <h3 class="mb-3">Change Password</h3>
            <form id="passwordForm" method="PUT" data-validate>
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" name="currentPassword" class="form-input" required>
                <div class="form-error"></div>
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="newPassword" class="form-input" required>
                <div class="form-error"></div>
              </div>
              <button type="submit" class="btn btn--secondary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="../js/api-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/forms.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
